<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VERDIS Platform</title>
  <style>
    body{margin:0;height:100vh;background:#fff;font-family:'Segoe UI','Noto Sans KR',sans-serif;overflow:hidden}

    #splash{
      position:fixed;inset:0;
      display:flex;align-items:center;justify-content:center;
      background:#fff;
      opacity:0;
      animation:fadeIn .8s ease forwards;
      z-index:1;
      transition:opacity .4s ease;
    }
    #splash img{
      max-width:80%;
      max-height:80%;
      object-fit:contain;
    }
    @keyframes fadeIn{to{opacity:1}}

    #app-frame{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      border:none;
      z-index:9999;
    }
  </style>
</head>
<body>

  <div id="splash">
    <img src="/splash.png" alt="VERDIS Platform">
  </div>

  <iframe
    id="app-frame"
    src="https://script.google.com/a/macros/interwell.co.kr/s/AKfycbyPHINSqhVhWeZkofghJV_pF7lTVI89He-TXWvXKZVCKfsyMXsmTg3hhCsvfbMnNQlS/exec"
    allowfullscreen
    allow="clipboard-read; clipboard-write">
  </iframe>

  <script>
    var frame = document.getElementById('app-frame');
    frame.addEventListener('load', function(){
      var splash = document.getElementById('splash');
      splash.style.opacity = '0';
      setTimeout(function(){ splash.style.display = 'none'; }, 400);
      frame.style.display = 'block';
    });
  </script>

</body>
</html>
